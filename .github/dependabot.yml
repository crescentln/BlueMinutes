version: 2
updates:
  - package-ecosystem: swift
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - swift
    commit-message:
      prefix: "deps"
    groups:
      compatible-updates:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/New_York
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
    groups:
      compatible-updates:
        update-types:
          - minor
          - patch
